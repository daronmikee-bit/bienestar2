<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENESTAR AI - Professional Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4a90e2;
            --accent: #d8816c;
            --success: #2ecc71;
            --bg: #fcfdfe;
            --card-bg: #ffffff;
        }

        /* ANIMACIONES DE ENTRADA */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: #212529;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .main-wrapper {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 30px 20px;
        }

        .header h1 {
            color: var(--accent);
            font-size: 2.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* TARJETAS CON EFECTO HOVER */
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e9ecef;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .card-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* TOOLTIPS INFORMATIVOS */
        .info-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: #eee;
            border-radius: 50%;
            text-align: center;
            font-size: 11px;
            line-height: 16px;
            cursor: help;
            margin-left: 5px;
            color: #666;
        }

        .info-icon:hover::after {
            content: attr(data-info);
            position: absolute;
            background: #333;
            color: white;
            padding: 8px;
            border-radius: 5px;
            font-size: 12px;
            width: 150px;
            z-index: 10;
            top: -40px;
            left: 0;
        }

        /* INPUTS */
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            background: #f8f9fa;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* BOTONES */
        .button-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #eef2f7; color: #4a5568; }

        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* SPINNER DE CARGA */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* RECOMENDACIONES ESTILIZADAS */
        .rec-item {
            padding: 12px;
            background: #f8fafc;
            border-left: 4px solid var(--primary);
            border-radius: 4px;
            margin-bottom: 10px;
        }

        /* PDF HIDDEN CONTENT */
        #pdf-header { display: none; }

        @media(max-width:700px){
            .card-row { flex-direction: column; }
            .button-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="main-wrapper" id="content-to-export">
    
    <div class="header">
        <h1>🧠 BIENESTARE AI</h1>
        <p>Análisis basado en tu modelo predictivo personal</p>
    </div>

    <div class="card-row">
        <div class="card input-group">
            <label>😴 Sueño (horas) <span class="info-icon" data-info="El tiempo ideal es de 7-9 horas para recuperación celular.">?</span></label>
            <input type="number" id="sueno" min="0" max="24" value="7">
        </div>
        <div class="card input-group">
            <label>🏃 Actividad <span class="info-icon" data-info="Nivel de movimiento físico hoy (1-10).">?</span></label>
            <input type="number" id="actividad" min="0" max="10" value="3">
        </div>
        <div class="card input-group">
            <label>🤯 Estrés <span class="info-icon" data-info="Impacto negativo directo en tu score final.">?</span></label>
            <input type="number" id="estres" min="0" max="10" value="3">
        </div>
    </div>

    <div class="button-container">
        <button class="btn-primary" id="btn-predict" onclick="predecir()">
            <div class="spinner" id="loader"></div>
            <span id="btn-text">🔎 Evaluar Bienestar</span>
        </button>
        <button class="btn-secondary" onclick="generarPDF()">
            📥 Descargar Reporte
        </button>
    </div>

    <div id="resultado-section">
        <div class="section-header" style="font-size: 1.5rem; margin: 30px 0 15px 0; border-bottom: 2px solid #eee;">📊 Informe de Resultados</div>
        <div class="card">
            <div style="font-size: 1.2rem; margin-bottom: 15px;">
                <strong>Bienestar:</strong> <span id="valor-num" style="font-size: 2rem; color: var(--primary);">125.35</span> / 300
            </div>
            <progress id="progreso-bar" value="125.35" max="300" style="width: 100%; height: 15px;"></progress>
            
            <div style="margin-top: 20px;">
                <label>Estado: <span id="estado-text" style="font-weight: bold;">Moderado</span></label>
                <meter id="medidor-estado" value="125.35" min="0" max="300" low="140" high="220" optimum="300" style="width: 100%; height: 30px;"></meter>
            </div>

            <div style="margin-top: 30px;">
                <strong>💡 Recomendaciones de la IA:</strong>
                <div id="recomendaciones-list" style="margin-top: 15px;">
                    </div>
            </div>
        </div>
    </div>

    <div class="section-header" style="font-size: 1.5rem; margin: 30px 0 15px 0;">📈 Análisis de Impacto</div>
    <div class="card-row">
        <div class="card" style="text-align: center;">
            <div style="color: #666; font-size: 0.9rem;">Balance Hábitos</div>
            <div id="stat-balance" style="font-size: 1.5rem; font-weight: bold;">Neutro</div>
        </div>
        <div class="card" style="text-align: center;">
            <div style="color: #666; font-size: 0.9rem;">Impacto Estrés</div>
            <div id="stat-estres" style="font-size: 1.5rem; font-weight: bold; color: #e74c3c;">-81.18</div>
        </div>
    </div>
</div>

<script>
    function predecir() {
        const btn = document.getElementById('btn-predict');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');
        
        // Efecto visual de carga
        btn.disabled = true;
        loader.style.display = 'block';
        btnText.innerText = 'Procesando...';

        let sueno = +document.getElementById("sueno").value;
        let actividad = +document.getElementById("actividad").value;
        let estres = +document.getElementById("estres").value;

        // Llamada a tu modelo en Render
        fetch("/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({sueno, actividad, estres})
        })
        .then(res => res.json())
        .then(data => {
            // Restaurar botón
            btn.disabled = false;
            loader.style.display = 'none';
            btnText.innerText = '🔎 Evaluar Bienestar';

            let valor = Math.max(0, Math.min(data.prediccion, 300));
            actualizarInterfaz(valor, sueno, actividad, estres);
        })
        .catch(err => {
            console.error(err);
            btn.disabled = false;
            loader.style.display = 'none';
            btnText.innerText = 'Reintentar';
            // Simulación por si el servidor está caído durante pruebas
            actualizarInterfaz(150, sueno, actividad, estres); 
        });
    }

    function actualizarInterfaz(valor, sueno, actividad, estres) {
        // Animación numérica
        let actual = 0;
        let int = setInterval(() => {
            actual += valor/20;
            if(actual >= valor) {
                actual = valor;
                clearInterval(int);
            }
            document.getElementById("valor-num").innerText = actual.toFixed(2);
            document.getElementById("progreso-bar").value = actual;
            document.getElementById("medidor-estado").value = actual;
        }, 30);

        // Lógica de Estado
        const stText = document.getElementById("estado-text");
        if(valor > 220) stText.innerText = "🔥 Excelente";
        else if(valor > 140) stText.innerText = "🙂 Moderado";
        else stText.innerText = "⚠️ Bajo";

        // Recomendaciones
        const list = document.getElementById("recomendaciones-list");
        list.innerHTML = "";
        if(sueno < 6) list.innerHTML += `<div class="rec-item">Prioriza el descanso: Detectamos menos de 6h de sueño. Tu cerebro necesita más tiempo de limpieza linfática.</div>`;
        if(estres > 7) list.innerHTML += `<div class="rec-item">Alerta de Cortisol: El estrés está penalizando fuertemente tu score. Intenta 5 min de respiración diafragmática.</div>`;
        if(actividad < 4) list.innerHTML += `<div class="rec-item">Sedentarismo detectado: Un aumento de +2 en actividad física podría subir tu score en 25 puntos.</div>`;
        if(list.innerHTML === "") list.innerHTML = `<div class="rec-item" style="border-color: #2ecc71">¡Perfecto! Mantienes un equilibrio saludable entre tus hábitos.</div>`;

        // Stats
        document.getElementById("stat-estres").innerText = "-" + (estres * 25).toFixed(2);
        document.getElementById("stat-balance").innerText = (sueno + actividad > 10) ? "Positivo" : "Neutro";
    }

    function generarPDF() {
        const element = document.getElementById('content-to-export');
        const opt = {
            margin: 0.5,
            filename: 'Reporte_Bienestar_AI.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
