<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIENESTAR - Predicción Inteligente</title>

<style>

/* ===== TU CSS ORIGINAL (SE MANTIENE) ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #fcfdfe;
    color: #212529;
    line-height: 1.5;
}

.main-wrapper {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.header {
    text-align: center;
    padding: 30px 20px;
}

.header h1 {
    color: #d8816c;
}

/* ===== MEJORAS NUEVAS ===== */

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

.card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #e9ecef;
    box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    flex: 1;
    min-width: 250px;
    transition: all 0.3s ease;
    animation: fadeIn 0.6s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.card-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ced4da;
    background: #f8f9fa;
}

.input-error {
    border: 2px solid #e74c3c !important;
}

.btn-primary {
    width: 100%;
    padding: 12px;
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn-primary:hover {
    background: #357abd;
    transform: scale(1.02);
}

.loader {
    display: none;
    text-align: center;
    margin-top: 10px;
}

.loader span {
    width: 10px;
    height: 10px;
    background: #4a90e2;
    display: inline-block;
    border-radius: 50%;
    animation: bounce 0.6s infinite alternate;
}

.loader span:nth-child(2){animation-delay:0.2s;}
.loader span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce {
    to { transform: translateY(-10px); }
}

progress {
    width: 100%;
    height: 12px;
}

.alert-card {
    transition: all 0.3s ease;
}

/* TABLA HISTORIAL */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border-bottom: 1px solid #eee;
    padding: 8px;
    text-align: center;
}

@media(max-width:700px){
    .card-row {flex-direction: column;}
}

</style>
</head>

<body>

<div class="main-wrapper">

<div class="header">
<h1>BIENESTAR</h1>
<p>Predice tu bienestar y mejora tu estilo de vida</p>
</div>

<div class="card-row">

<div class="card input-group">
<label>😴 Sueño</label>
<input type="number" id="sueno" value="7">
</div>

<div class="card input-group">
<label>🏃 Actividad</label>
<input type="number" id="actividad" value="3">
</div>

<div class="card input-group">
<label>🤯 Estrés</label>
<input type="number" id="estres" value="3">
</div>

</div>

<button class="btn-primary" onclick="predecir()">🔎 Evaluar mi bienestar</button>

<div class="loader" id="loader">
<span></span><span></span><span></span>
</div>

<div class="card">
<div id="valor-resultado">
<strong>Bienestar estimado:</strong>
<span id="valor-num">125.35</span> / 300
</div>

<progress id="progreso-bar" value="125.35" max="300"></progress>

<meter id="medidor-estado" value="125.35" min="0" max="300"></meter>

<div id="estado-text">Moderado</div>
</div>

<div class="alert-card card">
Estado inicial estable.
</div>

<!-- ===== OBJETIVO ===== -->
<div class="card">
<h3>🎯 Objetivo personal</h3>
<input type="number" id="objetivo" placeholder="Ej: 220">
<button class="btn-primary" onclick="guardarObjetivo()">Guardar objetivo</button>
<p id="estado-objetivo" style="margin-top:10px;font-weight:bold;"></p>
</div>

<!-- ===== HISTORIAL ===== -->
<div class="card">
<h3>📅 Historial</h3>
<button class="btn-primary" onclick="limpiarHistorial()" style="background:#e74c3c;">
🗑 Limpiar historial
</button>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Sueño</th>
<th>Actividad</th>
<th>Estrés</th>
<th>Resultado</th>
</tr>
</thead>
<tbody id="tabla-historial"></tbody>
</table>
</div>

</div>

<script>

/* VALIDACIÓN */
function validarInputs(){
    let valido = true;

    ["sueno","actividad","estres"].forEach(id=>{
        let el = document.getElementById(id);

        if(el.value === "" || el.value < 0){
            el.classList.add("input-error");
            valido = false;
        } else {
            el.classList.remove("input-error");
        }
    });

    return valido;
}

/* ANIMACIÓN */
function animarValor(final){
    let actual = 0;
    let intervalo = setInterval(()=>{
        actual += final/30;

        if(actual >= final){
            actual = final;
            clearInterval(intervalo);
        }

        document.getElementById("valor-num").innerText = actual.toFixed(2);
        document.getElementById("progreso-bar").value = actual;
        document.getElementById("medidor-estado").value = actual;

    },20);
}

/* FUNCIÓN PRINCIPAL */
function predecir(){

    if(!validarInputs()){
        alert("⚠️ Verifica los datos");
        return;
    }

    document.getElementById("loader").style.display = "block";

    setTimeout(()=>{

        let sueno = +document.getElementById("sueno").value;
        let actividad = +document.getElementById("actividad").value;
        let estres = +document.getElementById("estres").value;

        let prediccionBase = (sueno * 20) + (actividad * 10) - (estres * 15) + 80;

        let valor = Math.max(0, Math.min(prediccionBase,300));

        animarValor(valor);

        /* GUARDAR HISTORIAL */
        guardarEnHistorial(sueno, actividad, estres, valor);

        /* OBJETIVO */
        actualizarObjetivo(valor);

        /* COLOR DINÁMICO */
        let barra = document.getElementById("progreso-bar");

        if(valor > 220){
            barra.style.accentColor = "#27ae60";
        }else if(valor > 140){
            barra.style.accentColor = "#f1c40f";
        }else{
            barra.style.accentColor = "#e74c3c";
        }

        /* ESTADO */
        let estado = document.getElementById("estado-text");

        if(valor > 220){
            estado.innerText = "🔥 Excelente";
            estado.style.color = "#27ae60";
        }else if(valor > 140){
            estado.innerText = "🙂 Moderado";
            estado.style.color = "#f1c40f";
        }else{
            estado.innerText = "⚠️ Bajo";
            estado.style.color = "#e74c3c";
        }

        /* ALERTAS */
        let alerta = document.querySelector(".alert-card");

        if(estres > 7){
            alerta.innerText = "🚨 Alto estrés detectado";
            alerta.style.background = "#fdecea";
            alerta.style.color = "#c0392b";
        }else if(sueno < 5){
            alerta.innerText = "😴 Poco sueño detectado";
            alerta.style.background = "#fff4e6";
            alerta.style.color = "#d35400";
        }else{
            alerta.innerText = "✅ Estado estable";
            alerta.style.background = "#e8f8f1";
            alerta.style.color = "#27ae60";
        }

        document.getElementById("loader").style.display = "none";

    },800);
}

/* ===== HISTORIAL ===== */

function guardarEnHistorial(sueno, actividad, estres, valor){
    let historial = JSON.parse(localStorage.getItem("historial")) || [];

    historial.push({
        sueno, actividad, estres, valor,
        fecha: new Date().toLocaleString()
    });

    localStorage.setItem("historial", JSON.stringify(historial));
    renderHistorial();
}

function renderHistorial(){
    let tabla = document.getElementById("tabla-historial");
    tabla.innerHTML = "";

    let historial = JSON.parse(localStorage.getItem("historial")) || [];

    historial.slice().reverse().forEach(item=>{
        tabla.innerHTML += `
        <tr>
        <td>${item.fecha}</td>
        <td>${item.sueno}</td>
        <td>${item.actividad}</td>
        <td>${item.estres}</td>
        <td><strong>${item.valor.toFixed(2)}</strong></td>
        </tr>`;
    });
}

function limpiarHistorial(){
    localStorage.removeItem("historial");
    renderHistorial();
}

/* ===== OBJETIVO ===== */

function guardarObjetivo(){
    let obj = document.getElementById("objetivo").value;
    localStorage.setItem("objetivo", obj);
    actualizarObjetivo();
}

function actualizarObjetivo(valorActual=0){
    let objetivo = localStorage.getItem("objetivo");
    if(!objetivo) return;

    let estado = document.getElementById("estado-objetivo");

    let diff = objetivo - valorActual;

    if(diff <= 0){
        estado.innerText = "🎉 Objetivo alcanzado";
    }else{
        estado.innerText = "Te faltan " + diff.toFixed(2);
    }
}

/* INIT */
renderHistorial();
actualizarObjetivo();

</script>

</body>
</html>
