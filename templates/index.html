<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIENESTAR - Predicción Inteligente</title>

<style>

/* ===== TU CSS ORIGINAL (SE MANTIENE) ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #fcfdfe;
    color: #212529;
    line-height: 1.5;
}

.main-wrapper {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.header {
    text-align: center;
    padding: 30px 20px;
}

.header h1 {
    color: #d8816c;
}

/* ===== MEJORAS NUEVAS ===== */

/* Animaciones */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

.card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #e9ecef;
    box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    flex: 1;
    min-width: 250px;
    transition: all 0.3s ease;
    animation: fadeIn 0.6s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.card-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

/* Inputs */
.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ced4da;
    background: #f8f9fa;
}

.input-error {
    border: 2px solid #e74c3c !important;
}

/* Botón */
.btn-primary {
    width: 100%;
    padding: 12px;
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn-primary:hover {
    background: #357abd;
    transform: scale(1.02);
}

/* Loader */
.loader {
    display: none;
    text-align: center;
    margin-top: 10px;
}

.loader span {
    width: 10px;
    height: 10px;
    background: #4a90e2;
    display: inline-block;
    border-radius: 50%;
    animation: bounce 0.6s infinite alternate;
}

.loader span:nth-child(2){animation-delay:0.2s;}
.loader span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce {
    to { transform: translateY(-10px); }
}

/* Barra dinámica */
progress {
    width: 100%;
    height: 12px;
}

/* Alertas dinámicas */
.alert-card {
    transition: all 0.3s ease;
}

/* Responsive */
@media(max-width:700px){
    .card-row {flex-direction: column;}
}

</style>
</head>

<body>

<div class="main-wrapper">

<div class="header">
<h1>BIENESTAR</h1>
<p>Predice tu bienestar y mejora tu estilo de vida</p>
</div>

<div class="card-row">

<div class="card input-group">
<label>😴 Sueño</label>
<input type="number" id="sueno" value="7">
</div>

<div class="card input-group">
<label>🏃 Actividad</label>
<input type="number" id="actividad" value="3">
</div>

<div class="card input-group">
<label>🤯 Estrés</label>
<input type="number" id="estres" value="3">
</div>

</div>

<button class="btn-primary" onclick="predecir()">🔎 Evaluar mi bienestar</button>

<!-- LOADER NUEVO -->
<div class="loader" id="loader">
<span></span><span></span><span></span>
</div>

<div class="card">

<div id="valor-resultado">
<strong>Bienestar estimado:</strong>
<span id="valor-num">125.35</span> / 300
</div>

<progress id="progreso-bar" value="125.35" max="300"></progress>

<meter id="medidor-estado" value="125.35" min="0" max="300"></meter>

<div id="estado-text">Moderado</div>

</div>

<div class="alert-card card">
Estado inicial estable.
</div>

</div>

<script>

/* VALIDACIÓN */
function validarInputs(){
    let valido = true;

    ["sueno","actividad","estres"].forEach(id=>{
        let el = document.getElementById(id);

        if(el.value === "" || el.value < 0){
            el.classList.add("input-error");
            valido = false;
        } else {
            el.classList.remove("input-error");
        }
    });

    return valido;
}

/* ANIMACIÓN */
function animarValor(final){
    let actual = 0;
    let intervalo = setInterval(()=>{
        actual += final/30;

        if(actual >= final){
            actual = final;
            clearInterval(intervalo);
        }

        document.getElementById("valor-num").innerText = actual.toFixed(2);
        document.getElementById("progreso-bar").value = actual;
        document.getElementById("medidor-estado").value = actual;

    },20);
}

/* FUNCIÓN PRINCIPAL (TU LÓGICA SE RESPETA) */
function predecir(){

    if(!validarInputs()){
        alert("⚠️ Verifica los datos");
        return;
    }

    document.getElementById("loader").style.display = "block";

    setTimeout(()=>{

        let sueno = +document.getElementById("sueno").value;
        let actividad = +document.getElementById("actividad").value;
        let estres = +document.getElementById("estres").value;

        let prediccionBase = (sueno * 20) + (actividad * 10) - (estres * 15) + 80;

        let valor = Math.max(0, Math.min(prediccionBase,300));

        animarValor(valor);

        /* COLOR DINÁMICO */
        let barra = document.getElementById("progreso-bar");

        if(valor > 220){
            barra.style.accentColor = "#27ae60";
        }else if(valor > 140){
            barra.style.accentColor = "#f1c40f";
        }else{
            barra.style.accentColor = "#e74c3c";
        }

        /* ESTADO */
        let estado = document.getElementById("estado-text");

        if(valor > 220){
            estado.innerText = "🔥 Excelente";
            estado.style.color = "#27ae60";
        }else if(valor > 140){
            estado.innerText = "🙂 Moderado";
            estado.style.color = "#f1c40f";
        }else{
            estado.innerText = "⚠️ Bajo";
            estado.style.color = "#e74c3c";
        }

        /* ALERTAS */
        let alerta = document.querySelector(".alert-card");

        if(estres > 7){
            alerta.innerText = "🚨 Alto estrés detectado";
            alerta.style.background = "#fdecea";
            alerta.style.color = "#c0392b";
        }else if(sueno < 5){
            alerta.innerText = "😴 Poco sueño detectado";
            alerta.style.background = "#fff4e6";
            alerta.style.color = "#d35400";
        }else{
            alerta.innerText = "✅ Estado estable";
            alerta.style.background = "#e8f8f1";
            alerta.style.color = "#27ae60";
        }

        document.getElementById("loader").style.display = "none";

    },800);
}

</script>

</body>
</html>
